<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tennis Courts Academy</title>
    <link rel="stylesheet" href="./styles.css?v=81" />
  </head>
  <body>
    <section id="menuScreen" class="menu-screen">
      <div class="menu-shell">
        <p class="eyebrow">Tennis Courts Academy <span>v81</span></p>
        <img class="brand-logo menu-logo" src="./assets/tcacademy.png" alt="Tennis Courts Academy" />

        <div class="menu-grid">
          <section class="menu-panel player-select-panel">
            <p class="label">Profil</p>
            <label class="menu-field">Pseudo
              <input id="nicknameInput" type="text" maxlength="24" placeholder="Votre pseudo" />
            </label>
            <div class="coach-choice-row" aria-label="Choisir son coach">
              <button class="coach-choice active" type="button" data-menu-coach="0">
                <img src="./assets/cards/Demo-TC-_0028_Coach-JU-LOBBY.png" alt="Coach Ju" />
                <span>Coach Ju</span>
              </button>
              <button class="coach-choice" type="button" data-menu-coach="1">
                <img src="./assets/cards/Demo-TC-_0029_Coach-MAX-LOBBY.png" alt="Coach Max" />
                <span>Coach Max</span>
              </button>
              <button class="coach-choice" type="button" data-menu-coach="2">
                <img src="./assets/cards/Demo-TC-_0030_Coach-CARLA-LOBBY.png" alt="Coach Carla" />
                <span>Coach Carla</span>
              </button>
              <button class="coach-choice" type="button" data-menu-coach="3">
                <img src="./assets/cards/Demo-TC-_0031_Coach-CLEM-LOBBY.png" alt="Coach Clem" />
                <span>Coach Clem</span>
              </button>
            </div>
          </section>

          <section class="menu-panel">
            <div class="menu-actions">
              <div class="menu-mode-group">
                <p class="label">Entrainement</p>
                <button class="primary-button" type="button" data-start-solo="exchange">Échange</button>
                <button class="small-button" type="button" data-start-solo="set">Set</button>
              </div>
              <div class="menu-mode-group">
                <p class="label">Exhibition</p>
                <button class="small-button" type="button" data-start-solo="match2">Match 2 sets</button>
                <button class="small-button" type="button" data-start-solo="match3">Match 3 sets</button>
              </div>
              <div class="menu-mode-group">
                <p class="label">Compétition</p>
                <button class="small-button tournament-menu-button" type="button" data-start-solo="tournament2">Tournoi 2 sets</button>
                <button class="small-button tournament-menu-button" type="button" data-start-solo="tournament3">Slam 3 sets</button>
              </div>
            </div>
          </section>

          <section class="menu-panel online-lobby-panel">
            <div class="lobby-header">
              <p class="label">Lobby en ligne</p>
              <button id="refreshLobbyButton" class="small-button" type="button">Actualiser</button>
            </div>
            <div class="create-online-row">
              <select id="onlineFormatSelect" aria-label="Format de partie en ligne">
                <option value="2">Match 2 sets</option>
                <option value="3">Match 3 sets</option>
              </select>
              <button id="createLobbyRoomButton" class="primary-button" type="button">Créer une partie en ligne</button>
            </div>
            <div id="lobbyRooms" class="lobby-rooms" aria-live="polite"></div>
          </section>
        </div>
      </div>
    </section>

    <main class="app game-app hidden">
      <section class="topbar">
        <div>
          <p class="eyebrow">Tennis Courts Academy <span>v81</span></p>
          <img class="brand-logo" src="./assets/tcacademy.png" alt="Tennis Courts Academy" />
        </div>
        <div class="top-actions">
          <div id="modeInfoBadge" class="mode-info-badge" aria-live="polite">Mode</div>
          <button id="returnLobbyButton" class="small-button" type="button">Retour lobby</button>
          <button id="exportLogsButton" class="small-button" type="button">Exporter logs</button>
          <button id="revealAiButton" class="small-button reveal-button hidden" type="button">Révéler les cartes</button>
        </div>
      </section>

      <section id="tournamentPanel" class="tournament-panel hidden" aria-live="polite"></section>
      <section id="resultPanel" class="result-panel hidden" aria-live="polite"></section>
      <section id="tutorialOverlay" class="tutorial-overlay hidden" aria-live="polite"></section>

      <section class="scoreboard" aria-label="État de l'échange">
        <article class="rally-card">
          <p class="label">État du rallye</p>
          <div id="rallyState" class="rally-state"></div>
          <div id="effectNotice" class="effect-notice"></div>
        </article>
      </section>

      <section class="court">
        <section id="player1Panel" class="player-panel"></section>
        <section class="center-lane">
          <div id="previousTurnCards" class="previous-turn" aria-live="polite"></div>
          <div class="net-line"></div>
          <div id="log" class="log" aria-live="polite"></div>
        </section>
        <section id="player2Panel" class="player-panel"></section>
      </section>
    </main>

    <script src="./app.js?v=81"></script>
  </body>
</html>

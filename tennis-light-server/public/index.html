<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tennis Courts Light - Prototype</title>
    <link rel="stylesheet" href="./styles.css?v=28" />
  </head>
  <body>
    <main class="app">
      <section class="topbar">
        <div>
          <p class="eyebrow">Prototype jouable</p>
          <h1>Tennis Courts Light</h1>
        </div>
        <div class="top-actions">
          <button id="newGameButton" class="primary-button" type="button">Nouvel échange</button>
        </div>
      </section>

      <section id="resultPanel" class="result-panel hidden" aria-live="polite"></section>

      <section class="scoreboard" aria-label="Résumé de l'échange">
        <article id="player1Summary" class="summary-card"></article>
        <article class="rally-card">
          <p class="label">État du rallye</p>
          <div id="rallyState" class="rally-state"></div>
          <div id="effectNotice" class="effect-notice"></div>
        </article>
        <article id="player2Summary" class="summary-card"></article>
      </section>

      <section class="court">
        <section id="player1Panel" class="player-panel"></section>
        <section class="center-lane">
          <div id="previousTurnCards" class="previous-turn" aria-live="polite"></div>
          <div class="net-line"></div>
          <div id="log" class="log" aria-live="polite"></div>
        </section>
        <section id="player2Panel" class="player-panel"></section>
      </section>
    </main>

    <script src="./app.js?v=28"></script>
  </body>
</html>
